before_script:
  - docker login -u homuras -p $docker_token
variables:
  hd_name: "hexo"
  hd_route: "$d_route/hexo-docker:latest"
  hi_name: 'hexo-docker'
  dh_route: 'homuras/$hi_name:latest'
 

stages:
  - build
  - release

build:
  stage: build
  # services:
  #   - docker:dind
  script:
    - docker build --build-arg d_route=$d_route -t $hi_name .
  image: docker:latest
  #when: never

pushrm:
  stage: release
  image:
    name: chko/docker-pushrm
    entrypoint: ["/bin/sh", "-c", "/docker-pushrm"]
  variables:
    DOCKER_USER: homuras
    DOCKER_PASS: $docker_token
    PUSHRM_SHORT: hexo-docker
    PUSHRM_TARGET: docker.io/$DOCKER_USER/hexo-docker
    PUSHRM_DEBUG: 1
    PUSHRM_FILE: $CI_PROJECT_DIR/hub/README.md
  script: 
    - /bin/true
    - docker login -u homura -p $lab_token $d_route
    - docker tag $hi_name $hd_route
    - docker push $hd_route
 
    - docker login -u homuras -p $docker_token
    - docker tag $hi_name $dh_route
    - docker push $dh_route
    